name: watch-psn-prices

on:
  schedule:
    # Cada hora arranca un ciclo de vigilancia de ~55 min (escaneo cada ~60s) => cobertura casi 24/7.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      minutes:
        description: "Minutos de vigilancia (para pruebas usa un numero pequeno)"
        default: "55"

permissions:
  contents: write

concurrency:
  group: watch-psn-prices
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 62
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Vigilar (escaneo continuo de Eneba)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          PSN_WATCH_INTERVAL: "60"
          PSN_WATCH_MINUTES: ${{ github.event.inputs.minutes || '55' }}
        run: python scraper/watch.py

      - name: Guardar estado
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "chore: estado de vigilancia [skip ci]"
            git push || (git pull --rebase --autostash && git push)
          fi
