name: scrape-psn-prices

on:
  schedule:
    # Cada 15 minutos (UTC). GitHub puede retrasar el cron en picos de carga.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestana Actions

# Necesario para que el job pueda commitear data/state.json de vuelta al repo.
permissions:
  contents: write

# Evita que dos ejecuciones se solapen y choquen al hacer push.
concurrency:
  group: scrape-psn-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: python scraper/main.py

      - name: Guardar estado (commit de data/state.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el estado; no se hace commit."
          else
            git commit -m "chore: actualizar precios PSN [skip ci]"
            git push || (git pull --rebase --autostash && git push)
          fi
